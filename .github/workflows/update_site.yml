name: Автоматическое обновление сайта из ВКонтакте

on:
  schedule:
    # Запуск каждую ночь в 00:00 UTC (03:00 по Москве)
    - cron: '0 0 * * *'
  workflow_dispatch: # Возможность запуска вручную по кнопке

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка библиотек
        run: |
          pip install beautifulsoup4 pillow requests

      - name: Запуск парсера и обновление данных ВКонтакте
        run: |
          if [ -d "scripts_and_raw_data" ]; then
            cd scripts_and_raw_data
          fi
          python3 fetch_all_vk.py || true
          python3 build_site.py || true
          if [ -d "../scripts_and_raw_data" ]; then
            cp index.html ../index.html 2>/dev/null || true
            cp vk_posts_all.json ../vk_posts_all.json 2>/dev/null || true
          fi

      - name: Коммит и публикация обновленного сайта
        run: |
          git config --global user.name "VK-AutoBot"
          git config --global user.email "autobot@photo-ai-studio.ru"
          git add -A
          if git diff --staged --quiet; then
            echo "Новых публикаций в группе пока нет — база данных актуальна."
          else
            git commit -m "🤖 Автоматическое обновление данных портфолио из группы ВК [skip ci]"
            git push
          fi
